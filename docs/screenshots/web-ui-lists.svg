  <text x="118" y="698" fill="#1F2933" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Команды установки и обслуживания</text>
  <text x="118" y="734" fill="#6F7A86" font-family="Segoe UI, Arial, sans-serif" font-size="22">Отсюда можно обновить форк без сброса, перезапустить сервисы, переключить DNS override или удалить компоненты.</text>
